<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoffeeUnderflow | Analyzer v1.2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pure-white: #FFFFFF;
            --black: #000000;
            --dark-grey: #555555;
            --light-grey: #CCCCCC;
            --primary-red: #D32F2F;
        }

        body {
            background: var(--pure-white);
            font-family: 'Oswald', sans-serif;
            margin: 0;
            padding: 20px;
            overflow-y: auto;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            box-sizing: border-box;
        }

        /* Top Box: File Upload Blueprint */
        #drop-zone {
            background: var(--pure-white);
            border: 1px solid var(--black);
            color: var(--black);
            font-size: 24px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        #drop-zone.hover {
            background: #fafafa;
            border-width: 2px;
        }

        /* Middle Box: Job Requirements Blueprint */
        textarea {
            width: 100%;
            background: var(--pure-white);
            border: 1px solid var(--dark-grey);
            color: var(--black);
            font-family: 'Oswald', sans-serif;
            font-size: 24px;
            padding: 15px;
            margin-bottom: 20px;
            box-sizing: border-box;
            resize: vertical;
        }

        /* Bottom Element: Action Button Blueprint */
        button {
            background: var(--primary-red);
            color: var(--pure-white);
            border: none;
            font-family: 'Oswald', sans-serif;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 15px;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.2s ease;
        }
        button:hover {
            background: #B71C1C;
        }

        /* Output Box Blueprint (Hidden initially) */
        #output-box {
            display: none;
            background: var(--pure-white);
            border: 1px solid var(--primary-red);
            padding: 25px;
            margin-top: 25px;
            box-sizing: border-box;
        }

        .output-header {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: var(--black);
            margin-bottom: 15px;
        }

        .divider {
            border: 0;
            height: 1px;
            background: var(--light-grey);
            margin: 20px 0;
        }

        .suggestions-section {
            text-align: left;
            font-size: 24px;
            color: var(--black);
        }

        .suggestions-title {
            font-weight: 700;
            margin-bottom: 10px;
        }

        .suggestions-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .suggestions-list li {
            padding: 5px 0;
        }
        
        .error-text {
            color: var(--primary-red);
            font-weight: 700;
            text-align: center;
            font-size: 24px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="drop-zone">
        Upload your PDF file
        <input type="file" id="resume-file" hidden accept=".pdf">
    </div>

    <textarea id="job_desc" rows="4" placeholder="PASTE JOB REQUIREMENTS HERE..."></textarea>

    <button type="button" onclick="runAnalysis()">GO</button>

    <div id="output-box">
        <div class="output-header" id="output-header-text"></div>
        <hr class="divider" id="output-divider">
        <div class="suggestions-section" id="output-suggestions">
            <div class="suggestions-title">Skills to Improve:</div>
            <ul class="suggestions-list">
                <li>Spring Boot</li>
                <li>SQL</li>
                <li>REST APIs</li>
            </ul>
        </div>
    </div>
</div>

<script>
    const dz = document.getElementById('drop-zone');
    const fileInput = document.getElementById('resume-file');
    const outputBox = document.getElementById('output-box');
    const headerText = document.getElementById('output-header-text');
    const divider = document.getElementById('output-divider');
    const suggestions = document.getElementById('output-suggestions');

    dz.onclick = () => fileInput.click();
    
    fileInput.onchange = () => {
        if (fileInput.files.length > 0) {
            dz.innerHTML = `FILE LOADED: ${fileInput.files[0].name}`;
        }
    };
    
    dz.ondragover = (e) => { e.preventDefault(); dz.classList.add('hover'); };
    dz.ondragleave = () => dz.classList.remove('hover');
    dz.ondrop = (e) => {
        e.preventDefault();
        dz.classList.remove('hover');
        fileInput.files = e.dataTransfer.files;
        dz.innerHTML = `FILE LOADED: ${e.dataTransfer.files[0].name}`;
    };

    async function runAnalysis() {
        // Safeguard for empty inputs
        if (fileInput.files.length === 0) {
            outputBox.style.display = 'block';
            divider.style.display = 'none';
            suggestions.style.display = 'none';
            headerText.innerHTML = `<span class="error-text">ERROR: NO PDF FILE DETECTED.</span>`;
            return;
        }

// Setup loading layout state
        outputBox.style.display = 'block';
        divider.style.display = 'none';
        suggestions.style.display = 'none';
        headerText.innerHTML = "PROCESSING LOGIC CODES...";

        const formData = new FormData();
        formData.append('job_description', document.getElementById('job_desc').value);
        formData.append('resume', fileInput.files[0]);

        try {
            const response = await fetch('/analyze', { method: 'POST', body: formData });
            if (!response.ok) throw new Error('Network issue');
            const data = await response.json();
            
            // Convert score string to numeric value for tracking tiers
            const numericScore = parseFloat(data.match_score);
            
            // Dynamic Status Mapping without brackets
            let statusText = "";
            if (numericScore <= 20) {
                statusText = "STATUS: MISALIGNED";
            } else if (numericScore > 20 && numericScore <= 50) {
                statusText = "STATUS: CORE ALIGNED";
            } else {
                statusText = "STATUS: OPTIMIZED";
            }
            
            // Clear layout flags and display bracketless header text
            divider.style.display = 'block';
            suggestions.style.display = 'block';
            headerText.innerHTML = `> Match Score: ${data.match_score} — ${statusText}`;
            
        } catch (err) {
            divider.style.display = 'none';
            suggestions.style.display = 'none';
            headerText.innerHTML = `<span class="error-text">ERROR: SYSTEM OVERHEAT. SERVER BREAKING.</span>`;
        }
    }
</script>
</body>
</html>
