<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoffeeUnderflow | AI Machine</title>
    <style>
        :root { --primary-red: #D32F2F; --bg: #FFFFFF; --accent-grey: #F5F5F5; }
        /* UI Elements stay Courier */
        body, h1, #drop-zone, button, #terminal { font-family: 'Courier New', Courier, monospace; }
        /* Feedback content uses Sans-Serif for readability */
        .feedback-text { font-family: Arial, sans-serif; line-height: 1.6; color: #444; }
        
        body { background: var(--bg); margin: 0; padding: 10px; overflow-y: auto; }
        .container { max-width: 100%; margin: 10px auto; border: 2px solid #eee; padding: 20px; border-radius: 4px; }
        h1 { color: var(--primary-red); font-size: 1.2rem; margin-top: 0; }
        
        #drop-zone { border: 2px dashed var(--primary-red); background: var(--accent-grey); padding: 30px; text-align: center; cursor: pointer; margin-bottom: 15px; }
        #drop-zone.hover { background: #ffebee; border-style: solid; }
        
        textarea { width: 100%; font-family: sans-serif; border: 1px solid #ccc; padding: 10px; margin-bottom: 15px; box-sizing: border-box; }
        
        button { background: var(--primary-red); color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; }
        
        #terminal { background: #1a1a1a; color: #00ff00; padding: 15px; border-radius: 4px; margin-top: 15px; display: none; font-size: 0.85rem; }
        .error-text { color: #ff3333; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>SYSTEM // RESUME_ANALYZER_v1.0</h1>
    <textarea id="job_desc" rows="3" placeholder="PASTE JOB REQUIREMENTS HERE..."></textarea>

    <div id="drop-zone" id="dz">
        FEED THE MACHINE: DROP PDF HERE
        <input type="file" id="resume-file" hidden accept=".pdf">
    </div>

    <button type="button" onclick="runAnalysis()">INITIALIZE ANALYSIS</button>
    <div id="terminal"></div>
</div>

<script>
    const dz = document.getElementById('drop-zone');
    const fileInput = document.getElementById('resume-file');

    dz.onclick = () => fileInput.click();
    dz.ondragover = (e) => { e.preventDefault(); dz.classList.add('hover'); };
    dz.ondragleave = () => dz.classList.remove('hover');
    dz.ondrop = (e) => {
        e.preventDefault();
        dz.classList.remove('hover');
        fileInput.files = e.dataTransfer.files;
        dz.innerHTML = `FILE_LOADED: ${e.dataTransfer.files[0].name}`;
    };

    async function runAnalysis() {
        const term = document.getElementById('terminal');
        term.style.display = 'block';
        term.innerHTML = "> ACCESSING CORE...<br>> PARSING PDF...<br>> CALCULATING VECTOR DISTANCE...";

        const formData = new FormData();
        formData.append('job_description', document.getElementById('job_desc').value);
        formData.append('resume', fileInput.files[0]);

        try {
            const response = await fetch('/analyze', { method: 'POST', body: formData });
            if (!response.ok) throw new Error('Network snag');
            const data = await response.json();
            
            term.innerHTML += `<br>> ANALYSIS COMPLETE.<br><br><span style="color:white">MATCH_SCORE:</span> <span style="color:var(--primary-red)">${data.match_score}</span>`;
        } catch (err) {
            term.innerHTML += `<br><br><span class="error-text">[ERROR]: SYSTEM OVERHEAT. THE MACHINE IS TAKING A COFFEE BREAK. PLEASE TRY AGAIN IN 30 SECONDS.</span>`;
        }
    }

    const dz = document.getElementById('drop-zone');
    const fileInput = document.getElementById('resume-file');

    // Clicking the box triggers the file input
    dz.onclick = () => fileInput.click();
    
    // 1. FIX: Update text when a user selects a file via the file browser dialog
    fileInput.onchange = () => {
        if (fileInput.files.length > 0) {
            dz.innerHTML = `FILE_LOADED: <span style="color: var(--primary-red); font-weight: bold;">${fileInput.files[0].name}</span>`;
        }
    };
    
    // Handle drag and drop states
    dz.ondragover = (e) => { e.preventDefault(); dz.classList.add('hover'); };
    dz.ondragleave = () => dz.classList.remove('hover');
    dz.ondrop = (e) => {
        e.preventDefault();
        dz.classList.remove('hover');
        fileInput.files = e.dataTransfer.files;
        // Update text when file is dropped
        dz.innerHTML = `FILE_LOADED: <span style="color: var(--primary-red); font-weight: bold;">${e.dataTransfer.files[0].name}</span>`;
    };

    async function runAnalysis() {
        const term = document.getElementById('terminal');
        
        // 2. FIX: Add a safeguard in case they hit the button without a file loaded
        if (fileInput.files.length === 0) {
            term.style.display = 'block';
            term.innerHTML = `<span class="error-text">[ERROR]: NO DATA INPUT DETECTED. PLEASE LOAD A RESUME PDF.</span>`;
            return;
        }

        term.style.display = 'block';
        term.innerHTML = "> ACCESSING CORE...<br>> PARSING PDF...<br>> CALCULATING VECTOR DISTANCE...";

        const formData = new FormData();
        formData.append('job_description', document.getElementById('job_desc').value);
        formData.append('resume', fileInput.files[0]);

        try {
            const response = await fetch('/analyze', { method: 'POST', body: formData });
            if (!response.ok) throw new Error('Network snag');
            const data = await response.json();
            
            term.innerHTML += `<br>> ANALYSIS COMPLETE.<br><br><span style="color:white">MATCH_SCORE:</span> <span style="color:var(--primary-red)">${data.match_score}</span>`;
        } catch (err) {
            term.innerHTML += `<br><br><span class="error-text">[ERROR]: SYSTEM OVERHEAT. THE MACHINE IS TAKING A COFFEE BREAK. PLEASE TRY AGAIN IN 30 SECONDS.</span>`;
        }
    }
</script>
    </body>
</html>
